{% extends "base.html" %}

{% block title %}Delete Article{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-base-100 p-6 rounded-xl shadow-xl text-center">

  <h2 class="text-2xl font-bold text-error mb-4">
    Delete Article?
  </h2>

  <p class="mb-6">
    Are you sure you want to delete
    <strong>"{{ article.title }}"</strong>?
  </p>

  <form method="post">
    {% csrf_token %}

    <button class="btn btn-error w-full mb-3">
      Yes, delete
    </button>

    <a href="{{ article.get_absolute_url }}"
       class="btn btn-ghost w-full">
      Cancel
    </a>
  </form>

</div>
{% endblock %}
