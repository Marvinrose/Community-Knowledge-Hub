{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto p-6">
  <h1 class="text-4xl font-bold mb-2">{{ article.title }}</h1>
  <p class="text-sm text-gray-500 mb-6">
    By {{ article.author.username }} · {{ article.created_at|date:"M d, Y" }}
  </p>

  <article class="prose max-w-none">
    {{ article.content|linebreaks }}
  </article>

  <div class="mt-6">
    <a href="{% url 'articles' %}" class="btn btn-outline btn-sm">← Back</a>
  </div>
</div>
{% if user == article.author %}
<div class="flex gap-3 mt-6">
  <a href="{% url 'edit_article' article.slug %}"
     class="btn btn-outline btn-primary">
    Edit
  </a>

  <a href="{% url 'delete_article' article.slug %}"
     class="btn btn-outline btn-error">
    Delete
  </a>
</div>
{% endif %}
{% endblock %}
