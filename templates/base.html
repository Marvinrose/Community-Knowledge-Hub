{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Community Hub{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
</head>

<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <div class="navbar bg-base-100 shadow-sm px-6">
    <div class="flex-1">
      <a class="text-xl font-bold">Community Hub</a>
    </div>
    <div class="flex gap-2">
        <a href="/" class="btn btn-ghost btn-sm">Home</a>
        <a href="/articles/" class="btn btn-ghost btn-sm">Articles</a>
        <a href="#" class="btn btn-primary btn-sm">New Post</a>
    </div>
  </div>

  <!-- Page Content -->
  <main class="max-w-6xl mx-auto p-6">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer footer-center p-4 bg-base-200 text-base-content mt-12">
    <p>© 2026 Community Hub — Built with Django & DaisyUI</p>
  </footer>

</body>
</html>
